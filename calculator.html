<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="Bootstrap/bootstrap.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <div class="main-container">
      <div class="sub-container">
        <div class="inputscreen">
          <div class="shortcuts">
            <div>
              <button class="glass-btn">
                <i class="bi bi-clock-history"></i>
              </button>
            </div>
            <div>
              <button class="glass-btn">
                <i class="bi bi-calculator-fill"></i>
              </button>
            </div>
          </div>
          <div class="input" id="display"><span id="default">0</span></div>
        </div>

        <div class="calc">
          <div>
            <button class="btn btn-outline-light calc-btn" id="clear">
              AC
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="backspace"
              disabled>
              <i class="bi bi-backspace"></i>
            </button>
            <button class="btn btn-outline-light calc-btn" id="modulus" value="%">
              %
            </button>
            <button class="btn btn-outline-light calc-btn" id="divide" value="/">
              /
            </button>
          </div>
          <div>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="7">
              7
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="8">
              8
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="9">
              9
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="multiply"
              value="*">
              x
            </button>
          </div>
          <div>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="4">
              4
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="5">
              5
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="6">
              6
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="subtract"
              value="-">
              -
            </button>
          </div>
          <div>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="1">
              1
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="2">
              2
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="3">
              3
            </button>
            <button class="btn btn-outline-light calc-btn" id="add" value="+">
              +
            </button>
          </div>
          <div>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="0">
              0
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value=".">
              .
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="equals"
              value="=">
              =
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let display = document.getElementById("display");
      let zero = document.getElementById("default");
      let clear = document.getElementById("clear");
      const numberButtons = document.querySelectorAll("#number");
      const calcButtons = document.querySelectorAll(
        "#add, #subtract, #multiply, #divide, #modulus",
      );
      const solve = document.getElementById("equals");

      numberButtons.forEach((element) => {
        element.addEventListener("click", () => {
          if (element !== 0 ) {
            zero.remove();
            display.innerText += element.value;
          } else {
            display.innerText += element.value;
          }
        });
      });

      calcButtons.forEach((element) => {
        element.addEventListener("click", () => {
          display.innerText += element.value;
        });
      });

      solve.addEventListener("click", () => {
        zero.classList.toggle("answer");
        display.innerText = eval(display.innerText);
      });

      clear.addEventListener("click", () => {
        display.innerText = "";
      })
    </script>
    <script src="Bootstrap/bootstrap.bundle.js"></script>
  </body>
</html>
