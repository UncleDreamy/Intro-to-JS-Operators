<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="Bootstrap/bootstrap.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Javascript</title>
  </head>
  <body>
    <div class="main-container">
      <div class="sub-container">
        <div class="inputscreen">
          <div class="shortcuts">
            <div>
              <button class="glass-btn">
                <i class="bi bi-clock-history"></i>
              </button>
            </div>
            <div>
              <button class="glass-btn">
                <i class="bi bi-calculator-fill"></i>
              </button>
            </div>
          </div>
          <div class="input" id="display"><span id="default"></span></div>
        </div>

        <div class="calc">
          <div>
            <button class="btn btn-outline-light calc-btn" id="clear">
              AC
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="backspace"
              disabled>
              <i class="bi bi-backspace"></i>
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="modulus"
              value="%">
              %
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="divide"
              value="/">
              /
            </button>
          </div>
          <div>
            <button class="btn btn-outline-light calc-btn number" value="7">
              7
            </button>
            <button class="btn btn-outline-light calc-btn number" value="8">
              8
            </button>
            <button class="btn btn-outline-light calc-btn number" value="9">
              9
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="multiply"
              value="*">
              x
            </button>
          </div>
          <div>
            <button class="btn btn-outline-light calc-btn number" value="4">
              4
            </button>
            <button class="btn btn-outline-light calc-btn number" value="5">
              5
            </button>
            <button class="btn btn-outline-light calc-btn number" value="6">
              6
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="subtract"
              value="-">
              -
            </button>
          </div>
          <div>
            <button class="btn btn-outline-light calc-btn number" value="1">
              1
            </button>
            <button class="btn btn-outline-light calc-btn number" value="2">
              2
            </button>
            <button class="btn btn-outline-light calc-btn number" value="3">
              3
            </button>
            <button class="btn btn-outline-light calc-btn" id="add" value="+">
              +
            </button>
          </div>
          <div>
            <button class="btn btn-outline-light calc-btn number" value="0">
              0
            </button>
            <button class="btn btn-outline-light calc-btn number" value=".">
              .
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="equals"
              value="=">
              =
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // all variables for storing all inputs and pre solved info
      let display = document.getElementById("display");
      let zero = document.getElementById("default");
      let clear = document.getElementById("clear");
      // number collector
      const numberButtons = document.querySelectorAll(".number");
      // operator collector
      const calcButtons = document.querySelectorAll(
        "#add, #subtract, #multiply, #divide, #modulus",
      );
      // equal to button
      const solve = document.getElementById("equals");
      // backspace button
      const backspace = document.getElementById("backspace");
      // inputted numbers and operators collector
      let numbers = [];
      let operators = [];
      let currentInput = "";
      // answer and pre solved values output creator
      let preCalc = document.createElement("span");
      let answer = document.createElement("span");

      // numberButtons event listener
      numberButtons.forEach((element) => {
        element.addEventListener("click", () => {
          preCalc.classList.remove("answer");
          answer.innerText = "";

          // remove default zero on first real input
          if (currentInput === "" && zero.parentNode) {
            zero.remove();
          }

          if (currentInput.includes(".") && element.value === ".") {
            return;
          }
          // incremental typing of values
          currentInput += element.value;
          preCalc.innerText += element.value;
          display.appendChild(preCalc);

          // enable backspace once any number is entered
          backspace.disabled = false;
        });
      });

      // operator event listener
      calcButtons.forEach((element) => {
        element.addEventListener("click", () => {
          // If we just solved and then pressed an operator, start with the result as first operand
          if (preCalc.classList.contains("answer") && answer.innerText !== "") {
            numbers = [parseFloat(answer.innerText)];
            currentInput = "";
            preCalc.classList.remove("answer");
          }

          if (currentInput !== "") {
            numbers.push(parseFloat(currentInput));
            currentInput = "";
          } else if (numbers.length === 0 && answer.innerText !== "") {
            numbers.push(parseFloat(answer.innerText));
          }

          operators.push(element.value);
          preCalc.innerText = preCalc.innerText + element.value;
          answer.innerText = "";

          console.log("operators", operators);
          console.log("numbers", numbers);
        });
      });

      function handleMultiplyDivide(numbers, operators) {
        let newNumbers = [];
        let newOperators = [];

        let i = 0;
        for (i = 0; i < operators.length; i++) {
          if (operators[i] === "*") {
            // multiply the two numbers around this operator
            let result = numbers[i] * numbers[i + 1];
            // push the result back so pass 2 can use it
            newNumbers.push(result);
            // skip the next number since we already used it
            i++;
          } else if (operators[i] === "/") {
            let result = numbers[i] / numbers[i + 1];
            newNumbers.push(result);
            i++;
          } else {
            // not * or /, keep the number and operator for pass 2
            newNumbers.push(numbers[i]);
            newOperators.push(operators[i]);
          }
        }

        // push the last number after the last operator
        newNumbers.push(numbers[i]);

        return { newNumbers, newOperators };
      }

      function handleAddSubtract(numbers, operators) {
        let total = numbers[0];

        for (let i = 0; i < operators.length; i++) {
          if (operators[i] === "+") {
            total = total + numbers[i + 1];
          } else if (operators[i] === "-") {
            total = total - numbers[i + 1];
          }
        }

        return total;
      }

      function calculate(numbers, operators) {
        // step 1 - resolve * and / first
        let pass1 = handleMultiplyDivide(numbers, operators);

        // step 2 - resolve + and - next
        let answer = handleAddSubtract(pass1.newNumbers, pass1.newOperators);

        return answer;
      }

      // if equal to is clicked, calculate and display the answer using the functions created
      solve.addEventListener("click", () => {
        if (currentInput !== "") {
          numbers.push(parseFloat(currentInput));
        }

        // If last token is operator, ignore it
        if (operators.length >= numbers.length) {
          operators.pop();
        }

        if (numbers.length === 0 && currentInput === "") {
          return;
        }

        let result = calculate(numbers, operators);
        answer.innerText = result;
        answer.classList.remove("answer");
        preCalc.classList.add("answer");
        display.appendChild(answer);

        // reset for next expression (carry value as current to allow chain operations)
        numbers = [];
        operators = [];
        currentInput = "";
      });

      // clear everything if AC is clicked and disable backspace
      clear.addEventListener("click", () => {
        preCalc.classList.remove("answer");
        preCalc.innerText = "";
        answer.innerText = "";
        numbers = [];
        operators = [];
        currentInput = "";
        document.getElementById("backspace").disabled = true;
      });
    </script>
    <script src="Bootstrap/bootstrap.bundle.js"></script>
  </body>
</html>
