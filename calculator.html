<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="Bootstrap/bootstrap.css" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Calculator</title>
  </head>
  <body>
    <div class="main-container">
      <div class="sub-container">
        <div class="inputscreen">
          <div class="shortcuts">
            <div>
              <button class="glass-btn">
                <i class="bi bi-clock-history"></i>
              </button>
            </div>
            <div>
              <button class="glass-btn">
                <i class="bi bi-calculator-fill"></i>
              </button>
            </div>
          </div>
          <div class="input" id="display"><span id="default">0</span></div>
        </div>

        <div class="calc">
          <div>
            <button class="btn btn-outline-light calc-btn" id="clear">
              AC
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="backspace"
              disabled>
              <i class="bi bi-backspace"></i>
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="modulus"
              value="%">
              %
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="divide"
              value="/">
              /
            </button>
          </div>
          <div>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="7">
              7
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="8">
              8
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="9">
              9
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="multiply"
              value="*">
              x
            </button>
          </div>
          <div>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="4">
              4
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="5">
              5
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="6">
              6
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="subtract"
              value="-">
              -
            </button>
          </div>
          <div>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="1">
              1
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="2">
              2
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="3">
              3
            </button>
            <button class="btn btn-outline-light calc-btn" id="add" value="+">
              +
            </button>
          </div>
          <div>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value="0">
              0
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="number"
              value=".">
              .
            </button>
            <button
              class="btn btn-outline-light calc-btn"
              id="equals"
              value="=">
              =
            </button>
          </div>
        </div>
      </div>
    </div>

    <script>
      // all variables for storing all inputs and pre solved info
      let display = document.getElementById("display");
      let zero = document.getElementById("default");
      let clear = document.getElementById("clear");
      // number collector
      const numberButtons = document.querySelectorAll("#number");
      // operator collector
      const calcButtons = document.querySelectorAll(
        "#add, #subtract, #multiply, #divide, #modulus",
      );
      // equal to button
      const solve = document.getElementById("equals");
      // backspace button
      const backspace = document.getElementById("backspace");
      // unsolved values
      let values = [];
      // answer and pre solved values output creator
      let preCalc = document.createElement("span");
      let answer = document.createElement("span");

      // numberButtons event listener
      numberButtons.forEach((element) => {
        element.addEventListener("click", () => {
          preCalc.classList.remove("answer");
          answer.innerText = "";

          // if the first number pressed isnt zero, remive the default zero to avoid eg. (01)
          if (element !== 0) {
            zero.remove();
            // incremental typing of values
            values += element.value;
            preCalc.innerText += element.value;
            // display the values to the user
            display.appendChild(preCalc);
            // enable the backspace button after a number is typed
            backspace.disabled = false;
          } else {
            // else leave the zero, add new values and display it while leaving backspace disabled
            values += element.value;
            let preCalc = document.createElement("span");
            preCalc.innerText = element.value;
            backspace.disabled = false;
          }
        });
      });

      // operator event listener
      calcButtons.forEach((element) => {
        element.addEventListener("click", () => {
          // if the pre calculated values has enter answer mode (displayed ontop), remove it when the user clicks the operator
          if (preCalc.classList.remove("answer") == true) {
            preCalc.classList.add("answer");
            preCalc.innerText += element.value;
            values += element.value;
          } else {
            preCalc.innerText += element.value;
            values += element.value;
            answer.innerText = "";
          }
        });
      });

      // if equal to is clicked, create a span element, display the answer in it and output it
      solve.addEventListener("click", () => {
        preCalc.classList.add("answer");
        display.appendChild(answer);

        answer.innerText = eval(values);
      });

      // backspace.addEventListener("click", () => {
      //   values.slice(0, -1);
      //   display.innerText == values;
      // });

      // clear everything if AC is clicked and disable backspace
      clear.addEventListener("click", () => {
        preCalc.classList.remove("answer");
        preCalc.innerText = "";
        answer.innerText = "";
        values = [];
        document.getElementById("backspace").disabled = true;
      });
    </script>
    <script src="Bootstrap/bootstrap.bundle.js"></script>
  </body>
</html>
