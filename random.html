<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to JS</title>
  </head>
  <body>
    <!-- inline js -->
    <button type="submit" onclick="alert('Thank you for clicking me')" id>
      Click here to submit
    </button>

    <script>
      // declaring variables
      let x = 20;
      // console log for output
      // modulus (for finding the remainder of a division)
      console.log("Evaluaion:", x % 2);

      // logical operations
      // and operation
      console.log("Evaluaion:", true && false);
      // or operation
      console.log("Evaluaion:", false || true);
    </script>
  </body>
</html>
