<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="Bootstrap/bootstrap.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <title>Bounce</title>
    <style>
      @keyframes bounce {
        0%,
        100% {
          top: 83.5%;
        }
        50% {
          top: 20%;
        }
      }
      @keyframes left {
        0% {
          right: 45%;
          top: 83.5%;
        }
        25% {
          right: 65%;
          top: 50%;
        }
        50% {
          right: 88%;
          top: 83.5%;
        }
        75% {
          right: 65%;
          top: 10%;
        }
        100% {
          right: 45%;
          top: 83.5%;
        }
      }
      @keyframes right {
        0% {
          left: 45%;
          top: 83.5%;
        }
        25% {
          left: 65%;
          top: 50%;
        }
        50% {
          left: 88%;
          top: 83.5%;
        }
        75% {
          left: 65%;
          top: 10%;
        }
        100% {
          left: 45%;
          top: 83.5%;
        }
      }
      .up_animate {
        animation: bounce 3s ease-in-out infinite;
      }
      .left_animate {
        animation: left 5s ease-in-out infinite;
      }
      .right_animate {
        animation: right 5s ease-in-out infinite;
      }
      .down_animate {
        animation: none;
      }
      .main-container {
        width: 100vw !important;
        height: 100vh !important;
        border: none !important;
      }

      .inner-container {
        height: 35%;
        width: 30%;
      }
      .walls {
        background-color: black;
        width: 10%;
      }
      .ball-holder {
        width: 80%;
        position: relative;
        border-bottom: 2px solid black;
        border-top: 2px solid black;
      }
      .ball {
        border-radius: 50%;
        height: 50px;
        width: 50px;
        background-color: black;
        position: absolute;
        top: 83.5%;
        right: 45%;
      }
      .game-controller {
        height: 35%;
        width: 20%;
      }
      .top-container,
      .mid-container,
      .bottom-container {
        height: 33.3%;
        width: 100%;
      }
      button {
        width: 100px;
        height: 100%;
        color: black;
      }
    </style>
  </head>
  <body>
    <div
      class="main-container d-flex justify-content-around align-items-center">
      <!-- game screen -->
      <div
        class="d-flex align-items-center justify-content-center inner-container">
        <div class="walls h-100"></div>
        <div class="ball-holder w-75 h-100">
          <div class="ball" id="ball-circle"></div>
        </div>
        <div class="walls h-100"></div>
      </div>
      <!-- end of game screen  -->

      <!-- game controller -->
      <div class="d-flex flex-column game-controller">
        <div
          class="top-container d-flex justify-content-center align-items-center">
          <button class="btn btn-outline-dark" id="up-btn">Up</button>
        </div>
        <div
          class="mid-container d-flex justify-content-around align-items-center">
          <button class="btn btn-outline-dark" id="left-btn">Left</button>
          <button class="btn btn-outline-dark" id="right-btn">Right</button>
        </div>
        <div
          class="bottom-container d-flex justify-content-center align-items-center">
          <button class="btn btn-outline-dark" id="down-btn">Down</button>
        </div>
      </div>
    </div>

    <script>
      let up_btn = document.getElementById("up-btn");
      let left_btn = document.getElementById("left-btn");
      let right_btn = document.getElementById("right-btn");
      let down_btn = document.getElementById("down-btn");
      let ball = document.getElementById("ball-circle");

      up_btn.addEventListener("click", () => {
        ball.classList.add("up_animate");
        ball.classList.remove("left_animate");
        ball.classList.remove("right_animate");
        ball.classList.remove("down_animate");
      });
      left_btn.addEventListener("click", () => {
        ball.classList.add("left_animate");
        ball.classList.remove("up_animate");
        ball.classList.remove("right_animate");
        ball.classList.remove("down_animate");
      });
      right_btn.addEventListener("click", () => {
        ball.classList.add("right_animate");
        ball.classList.remove("up_animate");
        ball.classList.remove("left_animate");
        ball.classList.remove("down_animate");
      });
      down_btn.addEventListener("click", () => {
        ball.classList.remove("up_animate");
        ball.classList.remove("left_animate");
        ball.classList.remove("right_animate");
        ball.classList.add("down_animate");
      });
    </script>

    <script src="Bootstrap/bootstrap.bundle.js"></script>
  </body>
</html>
