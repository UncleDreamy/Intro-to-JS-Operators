<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Manual Calculator</title>
  </head>
  <body>
    <!-- text for warning users to input values and select an operator and the answer to the calculation will be displayed here -->
    <p id="message" style="color: red">
      Please Input all fields and select an operator
    </p>

    <!-- input for the first value -->
    <input
      type="number"
      name="num1"
      id="num1"
      placeholder="Input Value (Numbers Only)" />

    <!-- select to choose the operator for the calculation -->
    <input
      type="text"
      id="operator"
      placeholder="Please Type Operator (+, -, *, /)" />
    <!-- input for the second value -->
    <input
      type="number"
      name="num2"
      id="num2"
      placeholder="Input Value (Numbers Only)" />

    <!-- submit button -->
    <button id="submit">Solve</button>

    <script>
      // get the value of the first input field
      let num1 = document.getElementById("num1");

      // get the vlaue of the second input field
      let num2 = document.getElementById("num2");

      // get the value of the operator
      let operator = document.getElementById("operator");

      // submit button
      let submit = document.getElementById("submit");

      let message = document.getElementById("message");

      // get the value of the select field on click
      // submit.addEventListener("click", () => {
      //   if (num1.value == "" || num2.vlaue == "") {
      //     message.innerText =
      //       "Please Input all fields and select a mathematical operator (+, -, *, / only)";
      //   } else {
      //     let cv1 = Number(num1.value);
      //     let cv2 = Number(num2.value);
      //     message.innerText = cv1, operator, cv2;
      //   }
      // });

      submit.addEventListener("click", () => {
        // // ifelse condition for subtraction
        if (num1.value === 0 && num2.value === 0) {
          message.innerText = "Unknown Value Inputted";
        } else if (operator.value === "-") {
          let cv1 = Number(num1.value);
          let cv2 = Number(num2.value);
          message.innerText = cv1 - cv2;
        } else if (operator.value === "+") {
          let cv1 = Number(num1.value);
          let cv2 = Number(num2.value);
          message.innerText = cv1 + cv2;
        } else if (operator.value === "*") {
          let cv1 = Number(num1.value);
          let cv2 = Number(num2.value);
          message.innerText = cv1 * cv2;
        } else if (operator.value === "/") {
          let cv1 = Number(num1.value);
          let cv2 = Number(num2.value);
          message.innerText = cv1 / cv2;
        }
      });
    </script>
  </body>
</html>
